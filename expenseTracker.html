<!DOCTYPE html>
<html lang="en">
<head>
    <title>Expense Tracker</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* MAIN CONTAINER */
    .container {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 20px;
        width: 1000px;
        max-width: 100%;
    }

    /* LEFT & RIGHT PANELS */
    .left, .right {
        background: #ffffff;
        padding: 30px;
        border-radius: 14px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);

        display: flex;
        flex-direction: column;
        align-items: left;
    }
    

    /* INPUTS + SELECT */
    input, select {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: 0.2s ease;
        background: #fafafa;
        width: 80%;
        display: block;
        margin: 8px auto;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #a5b4fc;
        box-shadow: 0 0 6px rgba(165, 180, 252, 0.5);
    }

    /* BUTTON */
    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 20px;
        cursor: pointer;
        transition: 0.2s ease;
        margin-top: 10px;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(165, 180, 252, 0.4);
    }

    /* HEADINGS */
    h3 {
        margin-top: 20px;
        margin-bottom: 10px;
        color: #444;
    }

    /* SUMMARY BOXES */
    #income, #expense, #balance {
        width:80%;
        background: #f8f9ff;
        padding: 12px;
        margin: 8px 0;
        border-radius: 12px;
        border-left: 5px solid #a5b4fc;
        box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    }

    /* TRANSACTION LIST */
    #transaction-list div {
        background: #fdfdff;
        padding: 12px;
        margin: 8px 0;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        border-left: 4px solid #c4b5fd;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
        .container {
            grid-template-columns: 1fr;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <label for="description" >Description : </label>
            <input type ="text"class="inputDescription"><br>
            <label for="amount" >Amount : </label>
            <input type ="number" class="inputAmount"><br>
            <select class="type">
                <option value ="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <button onclick="display()">Add</button>
            </div>
            <div class="right">

            <h3>Summary</h3>

            <div id="income">Income : ₹0</div>
            <div id="expense">Expense : ₹0</div>
            <div id="balance">Balance : ₹0</div>

            <h3>Transaction History</h3>
            <div id="transaction-list"></div>
        </div>
    </div>

    <script>
        

        let inputArray = JSON.parse(localStorage.getItem("transactions")) || [];
    

        const inputDescription = document.querySelector(".inputDescription");
        const inputAmount = document.querySelector(".inputAmount");
        const inputType = document.querySelector(".type");

        function display() {
            const descriptionValue = inputDescription.value;
            const amountValue = Number(inputAmount.value);
            const typeValue = inputType.value;

            let transObj = {
                description: descriptionValue,
                amount: amountValue,
                type: typeValue
            };

            inputArray.push(transObj);

            localStorage.setItem("transactions", JSON.stringify(inputArray));
            console.log(inputArray);

            render(); //

            // clear inputs

            inputDescription.value = "";
            inputAmount.value = "";
            inputType.value = "income";
        }

        function render(){
            let html = "";
            
            for (let item of inputArray) {
                html += `<div>
                            ${item.description} - 
                            ${item.amount} - 
                            ${item.type}
                        </div>`;
            }

            document.querySelector("#transaction-list").innerHTML = html;

            updateSummary();
        }

        function updateSummary(){
            let income = 0;
            let expense = 0;
            for(let item of inputArray){
                if(item.type =='income'){
                    income += item.amount;
                }else{
                    expense += item.amount;
                }
            }
            document.getElementById("income").innerHTML = "Income : ₹" + income;
            document.getElementById("expense").innerHTML = "Expense : ₹" + expense;
            document.getElementById("balance").innerHTML = "Balance : ₹" + (income - expense);
        }
        render();
        
    </script>
</body>
</html>
