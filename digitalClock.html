<!DOCTYPE html>
<html lang="en">
<head>
    <title>Digital Clock</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #111827, #020617);
        font-family: Arial, sans-serif;
    }

    h1 {
        text-align: center;
        font-size: 42px;
        color: #cfe1f6; /* soft blue */
        margin-bottom: 40px;
        letter-spacing: 3px;
        text-shadow: 0 0 15px rgba(96, 165, 250, 0.6);
    }

    #currentTime {
        width: 230px;
        height: 230px;

        display: flex;
        justify-content: center;
        align-items: center;

        border-radius: 50%;

        /* new gradient */
        background: radial-gradient(circle, #1f2937, #0b1220);

        color: white; /* warm yellow clock color */
        font-size: 30px;
        font-weight: bold;
        letter-spacing: 3px;

        border: 4px solid #60a5fa;

        box-shadow:
            0 0 25px rgba(96, 165, 250, 0.4),
            inset 0 0 20px rgba(250, 204, 21, 0.1);
    }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div id="currentTime">00:00:00</div>
    <script>
        function currentTime(){
            let now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            //adding leading zeroes if needed
            if(hours < 10) hours = '0' + hours;
            if(minutes < 10) minutes = '0' + minutes;
            if(seconds < 10) seconds = '0' + seconds;

            let time = hours + ':' + minutes + ':' + seconds;
            console.log(time);
            document.getElementById("currentTime").innerText = time;
        }
        setInterval(currentTime,1000); //for function running every single second so for every one sec the function currentTime() will run 
        currentTime();
    </script>
</body>
</html>
